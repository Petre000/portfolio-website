<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcus Wear — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Lato:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0f14;--sidebar:#111318;--card:#16181f;--card-border:#1e2028;
  --gold:#c49a28;--gold-dim:#a07e1e;--gold-glow:rgba(196,154,40,.08);
  --text:#e8e4dc;--text-dim:#7a7670;--text-muted:#4a4740;
  --hover:#1a1c24;--danger:#e74c3c;--success:#27ae60;--info:#3498db;--warn:#e6b800;
  --sans:'Lato',sans-serif;--caps:'Cinzel',serif;--serif:'Playfair Display',serif;
}
html{font-size:15px}
body{background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;min-height:100vh;overflow-x:hidden}
.sidebar{width:220px;background:var(--sidebar);border-right:1px solid var(--card-border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50}
.s-logo{padding:1.1rem 1.25rem .9rem;border-bottom:1px solid var(--card-border);display:flex;align-items:center;gap:8px}
.s-logo img{width:32px;height:auto;filter:drop-shadow(0 0 8px rgba(196,154,40,.15))}
.s-logo-text{display:flex;flex-direction:column}
.s-logo-name{font-family:var(--caps);font-size:13px;font-weight:500;color:var(--gold);letter-spacing:.12em;line-height:1.1}
.s-logo-sub{font-size:8.5px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--text-muted);margin-top:1px}
.s-nav{flex:1;padding:.75rem 0;overflow-y:auto}
.s-item{display:flex;align-items:center;gap:.7rem;padding:.6rem 1.25rem;font-size:13px;font-weight:400;color:var(--text-dim);cursor:pointer;transition:all .15s;border-left:3px solid transparent;text-decoration:none}
.s-item:hover{background:var(--hover);color:var(--text)}
.s-item.active{background:var(--gold-glow);color:var(--gold);border-left-color:var(--gold);font-weight:600}
.s-item svg{width:16px;height:16px;flex-shrink:0;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.s-item .badge{margin-left:auto;background:var(--gold);color:#111;font-size:9.5px;font-weight:700;padding:1px 7px;border-radius:10px}
.s-divider{height:1px;background:var(--card-border);margin:.5rem 1.25rem}
.s-footer{padding:.8rem 1.25rem;border-top:1px solid var(--card-border);display:flex;align-items:center;gap:.6rem}
.s-avatar{width:30px;height:30px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#111;flex-shrink:0}
.s-user{font-size:12px;color:var(--text-dim);line-height:1.3;flex:1}
.s-user strong{display:block;color:var(--text);font-weight:600;font-size:12.5px}
.s-logout{background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px;transition:color .15s}
.s-logout:hover{color:var(--danger)}
.s-logout svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.main{margin-left:220px;flex:1;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--card-border);position:sticky;top:0;background:var(--bg);z-index:40;flex-wrap:wrap;gap:.5rem}
.tb-left h1{font-family:var(--serif);font-size:1.4rem;font-weight:400;color:var(--text)}
.tb-left p{font-size:12px;color:var(--text-muted);margin-top:2px}
.tb-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.btn{padding:8px 18px;border-radius:6px;font-size:12px;font-weight:600;letter-spacing:.06em;font-family:var(--sans);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;border:1px solid transparent;text-decoration:none}
.btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn-gold{background:var(--gold);color:#111;border-color:var(--gold)}
.btn-gold:hover{background:#d4aa3a}
.btn-outline{background:none;color:var(--text-dim);border-color:var(--card-border)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-danger{background:rgba(231,76,60,.1);color:var(--danger);border-color:rgba(231,76,60,.2)}
.btn-danger:hover{background:rgba(231,76,60,.2)}
.btn-sm{padding:5px 12px;font-size:11px}
.btn-primary-link{background:var(--gold);border-color:var(--gold);color:#111;font-weight:600;text-decoration:none;padding:7px 14px;border-radius:6px;font-size:12px;font-family:var(--sans);display:inline-flex;align-items:center;gap:5px}
.btn-primary-link:hover{background:#d4aa3a}
.btn-primary-link svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.content{padding:1.5rem 2rem 3rem}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--card);border:1px solid var(--card-border);border-radius:10px;padding:1.25rem 1.4rem;position:relative;overflow:hidden;transition:border-color .2s}
.stat-card:hover{border-color:rgba(196,154,40,.25)}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold);opacity:0;transition:opacity .2s}
.stat-card:hover::after{opacity:1}
.stat-label{font-size:9.5px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.5rem}
.stat-value{font-family:var(--serif);font-size:2rem;font-weight:400;color:var(--text);line-height:1}
.stat-sub{font-size:11.5px;color:var(--text-muted);margin-top:.4rem}
.stat-icon{position:absolute;top:1.1rem;right:1.2rem;width:36px;height:36px;border-radius:8px;background:var(--gold-glow);display:flex;align-items:center;justify-content:center}
.stat-icon svg{width:18px;height:18px;fill:none;stroke:var(--gold);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.grid-2-wide{display:grid;grid-template-columns:1.6fr 1fr;gap:1rem;margin-bottom:1.5rem}
.panel{background:var(--card);border:1px solid var(--card-border);border-radius:10px;overflow:hidden;margin-bottom:1rem}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.3rem;border-bottom:1px solid var(--card-border)}
.panel-title{font-size:14px;font-weight:700;color:var(--text)}
.panel-action{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);cursor:pointer;text-decoration:none;background:none;border:none;font-family:var(--sans)}
.panel-action:hover{opacity:.7}
.panel-body{padding:0}
.panel-pad{padding:1.3rem}
.dtable{width:100%;border-collapse:collapse}
.dtable thead th{padding:.7rem 1rem;font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted);text-align:left;border-bottom:1px solid var(--card-border);background:rgba(255,255,255,.01)}
.dtable tbody tr{border-bottom:1px solid var(--card-border);transition:background .12s;cursor:pointer}
.dtable tbody tr:last-child{border-bottom:none}
.dtable tbody tr:hover{background:var(--hover)}
.dtable td{padding:.7rem 1rem;font-size:12.5px;color:var(--text-dim);vertical-align:middle}
.dtable td:first-child{color:var(--text);font-weight:600}
.td-img{width:36px;height:36px;border-radius:4px;object-fit:cover;background:var(--card-border)}
.tag{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:4px;display:inline-block}
.tag-gold{background:rgba(196,154,40,.12);color:var(--gold)}
.tag-green{background:rgba(39,174,96,.12);color:var(--success)}
.tag-blue{background:rgba(52,152,219,.12);color:var(--info)}
.tag-red{background:rgba(231,76,60,.12);color:var(--danger)}
.tag-yellow{background:rgba(230,184,0,.12);color:var(--warn)}
.tag-muted{background:rgba(122,118,112,.12);color:var(--text-dim)}
.form-group{margin-bottom:1.1rem}
.form-group label{display:block;font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.4rem}
.form-input{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--card-border);border-radius:6px;color:var(--text);font-size:13px;font-family:var(--sans);outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--gold)}
.form-input::placeholder{color:var(--text-muted)}
select.form-input{cursor:pointer}
textarea.form-input{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-actions{display:flex;gap:.75rem;margin-top:1.5rem}
.cust-row{display:flex;align-items:center;padding:.7rem 1.3rem;border-bottom:1px solid var(--card-border);transition:background .12s;cursor:pointer}
.cust-row:last-child{border-bottom:none}
.cust-row:hover{background:var(--hover)}
.cust-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#111;flex-shrink:0;margin-right:.75rem}
.cust-info{flex:1}
.cust-name{font-size:13px;font-weight:600;color:var(--text)}
.cust-email{font-size:11px;color:var(--text-muted)}
.cust-spent{font-size:13px;font-weight:600;color:var(--gold);min-width:60px;text-align:right}
.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;padding:1.3rem}
.quick-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.45rem;padding:1rem .5rem;border-radius:8px;background:rgba(196,154,40,.05);border:1px solid rgba(196,154,40,.1);cursor:pointer;transition:all .15s;text-decoration:none}
.quick-btn:hover{background:rgba(196,154,40,.1);border-color:rgba(196,154,40,.25)}
.quick-btn svg{width:20px;height:20px;fill:none;stroke:var(--gold);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.quick-btn span{font-size:10.5px;font-weight:600;letter-spacing:.06em;color:var(--text-dim);text-align:center}
.chart-area{padding:1.3rem;min-height:220px}
.chart-canvas{width:100%;height:200px}
.toggle{position:relative;width:40px;height:22px;cursor:pointer;display:inline-block}
.toggle input{display:none}
.toggle .slider{position:absolute;inset:0;background:var(--card-border);border-radius:11px;transition:.2s}
.toggle .slider::before{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:var(--text-muted);left:3px;top:3px;transition:.2s}
.toggle input:checked+.slider{background:var(--gold)}
.toggle input:checked+.slider::before{transform:translateX(18px);background:#111}
.swatch-row{display:flex;gap:.5rem;flex-wrap:wrap}
.swatch{width:36px;height:36px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.swatch.active{border-color:var(--text);transform:scale(1.1)}
.swatch:hover{transform:scale(1.08)}
.pb-block{background:var(--bg);border:1px solid var(--card-border);border-radius:8px;padding:1rem 1.2rem;margin-bottom:.6rem;display:flex;align-items:center;gap:.8rem;cursor:grab;transition:border-color .15s}
.pb-block:hover{border-color:rgba(196,154,40,.25)}
.pb-block-name{font-size:13px;font-weight:600;color:var(--text)}
.pb-block-type{font-size:10.5px;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase}
.empty-state{padding:3rem 2rem;text-align:center}
.empty-state svg{width:48px;height:48px;fill:none;stroke:var(--text-muted);stroke-width:1.2;margin-bottom:1rem;opacity:.5}
.empty-state h3{font-family:var(--serif);font-size:1.15rem;font-weight:400;color:var(--text);margin-bottom:.4rem}
.empty-state p{font-size:12.5px;color:var(--text-muted);margin-bottom:1.2rem}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--card-border);border-radius:12px;width:90%;max-width:540px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 1.5rem;border-bottom:1px solid var(--card-border)}
.modal-header h3{font-family:var(--serif);font-size:1.15rem;font-weight:400;color:var(--text)}
.modal-close{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px}
.modal-close:hover{color:var(--text)}
.modal-close svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2}
.modal-body{padding:1.5rem}
.setting-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem}
.setting-row:last-child{margin-bottom:0}
.setting-label{font-size:13px;font-weight:600;color:var(--text)}
.setting-desc{font-size:11px;color:var(--text-muted)}
@media(max-width:1200px){.stats{grid-template-columns:repeat(2,1fr)}.grid-2,.grid-2-wide{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}}
@media(max-width:768px){.sidebar{width:60px}.s-logo img{width:24px}.s-logo-text,.s-item span:not(.badge),.s-user,.s-divider{display:none}.s-item{justify-content:center;padding:.7rem 0;border-left:none;border-right:3px solid transparent}.s-item.active{border-right-color:var(--gold);border-left:none}.s-footer{justify-content:center}.main{margin-left:60px}.stats{grid-template-columns:1fr 1fr}}
</style>
</head>

<script>
if(sessionStorage.getItem('mw_admin_auth')!=='true')window.location.href='login.html';
function logout(){sessionStorage.removeItem('mw_admin_auth');window.location.href='login.html'}

const D={
  products:[
    {id:1,cat:'Shirts',brand:'MARQUIS',name:"Slim Fit Dress Shirt",sizes:'14½–18½',price:29.99,stock:24,img:'https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?w=100&q=60',status:'active'},

    {id:4,cat:'Shirts',brand:'MARQUIS',name:"Classic Fit Cotton Blend",sizes:'14½–18½',price:29.99,stock:31,img:'https://images.unsplash.com/photo-1581655353564-df123a1eb820?w=100&q=60',status:'active'},
    {id:5,cat:'Shirts',brand:'MARQUIS',name:"French Cuff Dress Shirt",sizes:'14½–18½',price:39.99,stock:8,img:'https://images.unsplash.com/photo-1489987707025-afc232f7ea0f?w=100&q=60',status:'active'},
    {id:6,cat:'Shoes',brand:'DANIEL WAFER',name:"Pointed End Laced Shoes",sizes:'7–12',price:119.99,stock:12,img:'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=100&q=60',status:'active'},

function drawChart(){const cv=document.getElementById('revChart');if(!cv)return;const ctx=cv.getContext('2d');cv.width=cv.offsetWidth*2;cv.height=cv.offsetHeight*2;ctx.scale(2,2);const w=cv.offsetWidth,h=cv.offsetHeight,p={t:20,r:20,b:30,l:40},cw=w-p.l-p.r,ch=h-p.t-p.b;const data=Array.from({length:30},()=>Math.random()*40+5),max=Math.max(...data);ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=1;for(let i=0;i<=4;i++){const y=p.t+(ch/4)*i;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(w-p.r,y);ctx.stroke();ctx.fillStyle='#4a4740';ctx.font='10px Lato';ctx.textAlign='right';ctx.fillText('$'+Math.round(max-(max/4)*i),p.l-8,y+3)}const g=ctx.createLinearGradient(0,p.t,0,p.t+ch);g.addColorStop(0,'rgba(196,154,40,.18)');g.addColorStop(1,'rgba(196,154,40,0)');ctx.beginPath();ctx.moveTo(p.l,p.t+ch);data.forEach((v,i)=>{const x=p.l+(cw/29)*i,y=p.t+ch-(v/max)*ch;if(i===0)ctx.lineTo(x,y);else{const px=p.l+(cw/29)*(i-1),py=p.t+ch-(data[i-1]/max)*ch;ctx.bezierCurveTo((px+x)/2,py,(px+x)/2,y,x,y)}});ctx.lineTo(p.l+cw,p.t+ch);ctx.closePath();ctx.fillStyle=g;ctx.fill();ctx.beginPath();data.forEach((v,i)=>{const x=p.l+(cw/29)*i,y=p.t+ch-(v/max)*ch;if(i===0)ctx.moveTo(x,y);else{const px=p.l+(cw/29)*(i-1),py=p.t+ch-(data[i-1]/max)*ch;ctx.bezierCurveTo((px+x)/2,py,(px+x)/2,y,x,y)}});ctx.strokeStyle='#c49a28';ctx.lineWidth=2;ctx.stroke()}

function addCoup(){const c=$('mcCode').value.toUpperCase(),d=$('mcDisc').value,m=$('mcMax').value,e=$('mcExp').value;if(!c||!d)return alert('Required');D.coupons.push({code:c,discount:d,uses:0,maxUses:m?parseInt(m):null,status:'active',expires:e||null});closeModal();nav('marketing')}
function renderMarketing(){
  tb('Marketing','Coupons & promotions',`<button class="btn btn-gold btn-sm" onclick="openModal('Create Coupon',\`<div class=form-row><div class=form-group><label>Code</label><input class=form-input id=mcCode placeholder=SUMMER30 style=text-transform:uppercase></div><div class=form-group><label>Discount</label><input class=form-input id=mcDisc placeholder='25% or $10'></div></div><div class=form-row><div class=form-group><label>Max Uses</label><input class=form-input id=mcMax type=number placeholder=Unlimited></div><div class=form-group><label>Expires</label><input class=form-input id=mcExp type=date></div></div><div class=form-actions><button class='btn btn-gold' onclick=addCoup()>Create</button><button class='btn btn-outline' onclick=closeModal()>Cancel</button></div>\`)"><svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Create Coupon</button>`);
  $('pageContent').innerHTML=`<div class="stats" style="grid-template-columns:repeat(3,1fr)"><div class="stat-card"><div class="stat-label">Active Coupons</div><div class="stat-value">${D.coupons.filter(c=>c.status==='active').length}</div></div><div class="stat-card"><div class="stat-label">Total Uses</div><div class="stat-value">${D.coupons.reduce((s,c)=>s+c.uses,0)}</div></div><div class="stat-card"><div class="stat-label">Revenue Impact</div><div class="stat-value">~$0</div></div></div>
  <div class="panel"><div class="panel-header"><span class="panel-title">Coupon Codes</span></div><div class="panel-body"><table class="dtable"><thead><tr><th>Code</th><th>Discount</th><th>Uses</th><th>Max</th><th>Expires</th><th>Status</th></tr></thead><tbody>${D.coupons.map(c=>`<tr><td style="font-family:monospace;letter-spacing:.08em">${c.code}</td><td>${c.discount}</td><td>${c.uses}</td><td>${c.maxUses||'∞'}</td><td>${c.expires||'Never'}</td><td>${st(c.status)}</td></tr>`).join('')}</tbody></table></div></div>`;
}

// PAGE BUILDER
function addPg(){const t=$('mpgT').value,s=$('mpgS').value;if(!t)return alert('Title required');D.pages.push({id:D.pages.length+1,title:t,slug:s||'/'+t.toLowerCase().replace(/\s+/g,'-'),status:'draft',blocks:[]});closeModal();nav('pagebuilder')}
function showBlocks(id){const p=D.pages.find(x=>x.id===id);if(!p)return;$('pbBlocks').innerHTML=p.blocks.length?p.blocks.map(b=>`<div class="pb-block"><div style="color:var(--text-muted)"><svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor;stroke:none"><circle cx="9" cy="6" r="1.5"/><circle cx="15" cy="6" r="1.5"/><circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/><circle cx="9" cy="18" r="1.5"/><circle cx="15" cy="18" r="1.5"/></svg></div><div style="flex:1"><div class="pb-block-name">${b}</div><div class="pb-block-type">Section Block</div></div></div>`).join(''):'<div class="empty-state"><p>No blocks yet — add sections to build this page</p></div>'}
function renderPageBuilder(){
  tb('Page Builder','Manage pages',`<button class="btn btn-gold btn-sm" onclick="openModal('New Page',\`<div class=form-group><label>Title</label><input class=form-input id=mpgT placeholder='About Us'></div><div class=form-group><label>URL Slug</label><input class=form-input id=mpgS placeholder='/about-us'></div><div class=form-actions><button class='btn btn-gold' onclick=addPg()>Create</button><button class='btn btn-outline' onclick=closeModal()>Cancel</button></div>\`)"><svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>New Page</button>`);
  $('pageContent').innerHTML=`<div class="grid-2">
    <div class="panel"><div class="panel-header"><span class="panel-title">Pages</span></div><div class="panel-body"><table class="dtable"><thead><tr><th>Page</th><th>URL</th><th>Blocks</th><th>Status</th></tr></thead><tbody>${D.pages.map(p=>`<tr onclick="showBlocks(${p.id})"><td>${p.title}</td><td style="font-family:monospace;font-size:11px">${p.slug}</td><td>${p.blocks.length}</td><td>${st(p.status)}</td></tr>`).join('')}</tbody></table></div></div>
    <div class="panel"><div class="panel-header"><span class="panel-title">Page Blocks</span><span class="panel-action">Click a page →</span></div><div class="panel-pad" id="pbBlocks"><div class="empty-state"><p>Select a page to view its blocks</p></div></div></div>
  </div>`;
}

// TICKETS
function addTkt(){const s=$('mtS').value,f=$('mtF').value,p=$('mtP').value;if(!s)return alert('Subject required');D.tickets.push({id:`TKT-${String(D.tickets.length+1).padStart(3,'0')}`,subject:s,from:f||'Unknown',status:'open',date:new Date().toISOString().split('T')[0],priority:p});closeModal();nav('tickets')}
function updTkt(id,s){const t=D.tickets.find(x=>x.id===id);if(t)t.status=s;renderTickets()}
function renderTickets(){
  tb('Tickets','Support & inquiries',`<button class="btn btn-gold btn-sm" onclick="openModal('New Ticket',\`<div class=form-group><label>Subject</label><input class=form-input id=mtS placeholder='Refund request'></div><div class=form-row><div class=form-group><label>From</label><input class=form-input id=mtF placeholder='Customer name'></div><div class=form-group><label>Priority</label><select class=form-input id=mtP><option value=low>Low</option><option value=normal selected>Normal</option><option value=high>High</option></select></div></div><div class=form-actions><button class='btn btn-gold' onclick=addTkt()>Create</button><button class='btn btn-outline' onclick=closeModal()>Cancel</button></div>\`)"><svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>New Ticket</button>`);
  $('pageContent').innerHTML=`<div class="stats" style="grid-template-columns:repeat(3,1fr)"><div class="stat-card"><div class="stat-label">Open</div><div class="stat-value" style="color:var(--gold)">${D.tickets.filter(t=>t.status==='open').length}</div></div><div class="stat-card"><div class="stat-label">Resolved</div><div class="stat-value" style="color:var(--success)">${D.tickets.filter(t=>t.status==='resolved').length}</div></div><div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${D.tickets.length}</div></div></div>
  <div class="panel"><div class="panel-header"><span class="panel-title">All Tickets</span></div><div class="panel-body"><table class="dtable"><thead><tr><th>ID</th><th>Subject</th><th>From</th><th>Date</th><th>Priority</th><th>Status</th><th>Update</th></tr></thead><tbody>${D.tickets.map(t=>`<tr><td>${t.id}</td><td>${t.subject}</td><td>${t.from}</td><td>${t.date}</td><td>${st(t.priority)}</td><td>${st(t.status)}</td><td><select class="form-input" style="width:auto;padding:4px 8px;font-size:11px" onchange="updTkt('${t.id}',this.value)"><option ${t.status==='open'?'selected':''}>open</option><option ${t.status==='resolved'?'selected':''}>resolved</option><option ${t.status==='closed'?'selected':''}>closed</option></select></td></tr>`).join('')}</tbody></table></div></div>`;
}

// SETTINGS
function renderSettings(){
  tb('Settings','Store configuration');
  $('pageContent').innerHTML=`<div class="grid-2">
    <div class="panel"><div class="panel-header"><span class="panel-title">Store Information</span></div><div class="panel-pad">
      <div class="form-group"><label>Store Name</label><input class="form-input" value="Marcus Wear"></div>
      <div class="form-group"><label>Tagline</label><input class="form-input" value="The Art of Fine Tailoring — Est. 1996"></div>
      <div class="form-row"><div class="form-group"><label>Phone</label><input class="form-input" value="(248) 399-8300"></div><div class="form-group"><label>Email</label><input class="form-input" value="info@marcuswear.com"></div></div>
      <div class="form-group"><label>Address</label><textarea class="form-input" rows="2">24705 Coolidge Hwy, Oak Park, MI 48237</textarea></div>
      <div class="form-actions"><button class="btn btn-gold">Save Changes</button></div>
    </div></div>
    <div>
      <div class="panel"><div class="panel-header"><span class="panel-title">Business Hours</span></div><div class="panel-pad">
        <div class="form-row"><div class="form-group"><label>Mon–Fri</label><input class="form-input" value="10:00 AM – 6:00 PM"></div><div class="form-group"><label>Saturday</label><input class="form-input" value="10:00 AM – 5:00 PM"></div></div>
        <div class="form-group"><label>Sunday</label><input class="form-input" value="Closed"></div>
        <div class="form-actions"><button class="btn btn-gold">Save Hours</button></div>
      </div></div>
      <div class="panel"><div class="panel-header"><span class="panel-title">Shipping</span></div><div class="panel-pad">
        <div class="setting-row"><div><div class="setting-label">Free Shipping Threshold</div><div class="setting-desc">Orders above ship free</div></div><input class="form-input" style="width:100px" value="$150"></div>
        <div class="setting-row"><div><div class="setting-label">Flat Rate Shipping</div><div class="setting-desc">Default cost</div></div><input class="form-input" style="width:100px" value="$8.99"></div>
        <div class="form-actions"><button class="btn btn-gold">Save</button></div>
      </div></div>
      <div class="panel"><div class="panel-header"><span class="panel-title">Notifications</span></div><div class="panel-pad">
        <div class="setting-row"><div><div class="setting-label">Order Notifications</div><div class="setting-desc">Email on new orders</div></div><label class="toggle"><input type="checkbox" checked><span class="slider"></span></label></div>
        <div class="setting-row"><div><div class="setting-label">Low Stock Alerts</div><div class="setting-desc">Alert when stock ≤ 3</div></div><label class="toggle"><input type="checkbox" checked><span class="slider"></span></label></div>
        <div class="setting-row"><div><div class="setting-label">New Customer Alerts</div><div class="setting-desc">Email on registration</div></div><label class="toggle"><input type="checkbox"><span class="slider"></span></label></div>
      </div></div>
    </div>
  </div>
  <div class="panel"><div class="panel-header"><span class="panel-title" style="color:var(--danger)">Danger Zone</span></div><div class="panel-pad" style="display:flex;align-items:center;justify-content:space-between"><div><div class="setting-label">Reset Store Data</div><div class="setting-desc">Clear all orders, customers, and analytics</div></div><button class="btn btn-danger">Reset All Data</button></div></div>`;
}

// NAV
const pages={overview:renderOverview,products:renderProducts,inventory:renderInventory,orders:renderOrders,customers:renderCustomers,themes:renderThemes,marketing:renderMarketing,pagebuilder:renderPageBuilder,tickets:renderTickets,settings:renderSettings};
function nav(p){document.querySelectorAll('.s-item').forEach(i=>i.classList.remove('active'));const el=document.querySelector(`[data-page="${p}"]`);if(el)el.classList.add('active');if(pages[p])pages[p]();window.scrollTo(0,0)}
document.querySelectorAll('.s-item').forEach(i=>i.addEventListener('click',()=>nav(i.dataset.page)));
nav('overview');
</script>
</body>
</html>
